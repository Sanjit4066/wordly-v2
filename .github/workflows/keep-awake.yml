name: Keep Backend Awake

on:
  schedule:
    # Runs every 10 minutes to prevent Render from spinning down (15 min sleep threshold)
    - cron: '*/10 * * * *'
  # Allows you to trigger it manually from the GitHub Actions tab if needed
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Route
        run: |
          echo "Pinging backend to keep it awake..."
          curl -f https://wordly-v2-backend.onrender.com/health
